<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Login | Multi Plant Leaf Disease</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body{
    font-family:'Poppins',sans-serif;
    background:
        linear-gradient(120deg,rgba(15,81,50,0.9),rgba(32,201,151,0.9)),
        url("../static/images/admin-bg.jpg") center/cover;
    margin:0;
}

/* LOGIN CARD */
.login-card{
    background:rgba(255,255,255,0.95);
    border-radius:22px;
    padding:45px;
    width:100%;
    max-width:420px;
    box-shadow:0 25px 60px rgba(0,0,0,0.35);
    position:relative;
}

/* TOP ICON */
.admin-icon{
    width:85px;
    height:85px;
    background:linear-gradient(120deg,#198754,#20c997);
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    margin:-85px auto 20px;
    box-shadow:0 15px 35px rgba(0,0,0,0.3);
}
.admin-icon i{
    font-size:36px;
    color:#fff;
}

/* TITLE */
.login-card h3{
    text-align:center;
    font-weight:700;
    color:#0f5132;
    margin-bottom:8px;
}
.login-card p{
    text-align:center;
    font-size:14px;
    color:#555;
    margin-bottom:30px;
}

/* INPUT */
.form-control{
    border-radius:14px;
    padding:12px 15px;
    border:1px solid #ced4da;
}
.input-group-text{
    background:#e9f7f2;
    border:none;
    border-radius:14px 0 0 14px;
    color:#198754;
}

/* BUTTON */
.btn-login{
    background:linear-gradient(120deg,#198754,#0dcaf0);
    color:#fff;
    font-weight:600;
    padding:12px;
    border-radius:30px;
    border:none;
    width:100%;
    box-shadow:0 10px 25px rgba(0,0,0,0.25);
}
.btn-login:hover{
    opacity:0.95;
}

/* BACK LINK */
.back-link{
    text-align:center;
    margin-top:20px;
}
.back-link a{
    text-decoration:none;
    color:#198754;
    font-weight:500;
}
.back-link a:hover{
    text-decoration:underline;
}

/* FOOTER TEXT */
.footer-text{
    text-align:center;
    font-size:12px;
    color:#777;
    margin-top:15px;
}
/* ===== ADVANCED TOP MENU (SAME AS HOME) ===== */
.navbar-advanced{
    background: linear-gradient(120deg,#0f5132,#198754,#20c997,#0dcaf0);
    backdrop-filter: blur(10px);
    box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    padding: 12px 0;
}

.navbar-advanced .navbar-brand{
    color:#fff !important;
    font-weight:700;
    font-size:22px;
    letter-spacing:1px;
}

.navbar-advanced .navbar-brand i{
    color:#ffd966;
    margin-right:6px;
}

.navbar-advanced .nav-link{
    color:#ffffff !important;
    font-weight:600;
    margin:0 10px;
    position:relative;
    padding:8px 0;
}

.navbar-advanced .nav-link::after{
    content:'';
    position:absolute;
    width:0;
    height:3px;
    left:0;
    bottom:-5px;
    background:#ffd966;
    transition:0.4s;
}

.navbar-advanced .nav-link:hover::after{
    width:100%;
}

.navbar-advanced .nav-link i{
    margin-right:6px;
    color:#ffd966;
}

/* Highlight ADMIN */
.menu-admin{
    background:#ffd966;
    color:#003f36 !important;
    padding:8px 18px !important;
    border-radius:30px;
    box-shadow:0 6px 18px rgba(0,0,0,0.25);
}

.menu-admin i{
    color:#003f36 !important;
}

.navbar-toggler{
    border:2px solid #fff;
}
.login-wrapper{
    min-height: calc(100vh - 90px); /* height minus navbar */
    display: flex;
    align-items: center;
    justify-content: center;
}
</style>
</head>

<body>
<nav class="navbar navbar-expand-lg navbar-advanced sticky-top">
    <div class="container">
        <a class="navbar-brand" href="/">
            <i class="fa fa-seedling"></i> MULTI PLANT LEAF
        </a>

        <button class="navbar-toggler text-white" type="button"
                data-bs-toggle="collapse" data-bs-target="#menu">
            <i class="fa fa-bars"></i>
        </button>

        <div class="collapse navbar-collapse" id="menu">
            <ul class="navbar-nav ms-auto align-items-center">
                <li class="nav-item">
                    <a class="nav-link" href="/">
                        <i class="fa fa-home"></i> Home
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/login_user">
                        <i class="fa fa-upload"></i> Detect Disease
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link menu-admin" href="/login">
                        <i class="fa fa-user-shield"></i> Admin
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>
<div class="login-wrapper">
<div class="login-card">

    <div class="admin-icon">
        <i class="fa fa-user-shield"></i>
    </div>

    <h3>Admin Login</h3>
    <p>Restricted access – authorized personnel only</p>

    <form action="/admin_login" method="post">
        <div class="mb-3 input-group">
            <span class="input-group-text">
                <i class="fa fa-user"></i>
            </span>
            <input type="text" name="username" class="form-control"
                   placeholder="Admin Username" required>
        </div>

        <div class="mb-4 input-group">
            <span class="input-group-text">
                <i class="fa fa-lock"></i>
            </span>
            <input type="password" name="password" class="form-control"
                   placeholder="Password" required>
        </div>

        <button type="submit" class="btn btn-login">
            <i class="fa fa-sign-in-alt"></i> Secure Login
        </button>
    </form>

    <div class="back-link">
        <a href="/">
            <i class="fa fa-arrow-left"></i> Back to Home
        </a>
    </div>

    <div class="footer-text">
        Multi Plant Leaf Disease Detection System
    </div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
